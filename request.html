    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
</head>
<body>
    <div class="page-bg" id="pageBg" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="site-header">
        <div class="logo">
            <a href="index.html">
                <span class="logo-mark" aria-hidden="true"><i class="fas fa-tools"></i><i class="fas fa-wrench" style="font-size:0.65em;margin-inline-start:-4px;"></i></span>
                <span data-i18n="app_name">دليل الحرفيين</span>
            </a>
        </div>
        <nav class="site-nav">
            <div class="site-nav-links">
                <a href="index.html" data-i18n="nav_home">الرئيسية</a>
                <a href="all-specialties.html" data-i18n="nav_specialties">التخصصات</a>
                <a href="terms.html" data-i18n="nav_terms">الشروط والأحكام</a>
            </div>
            <div class="nav-actions">
                <div class="dropdown lang-dropdown">
                    <button type="button" class="lang-toggle" id="langToggleBtn"><i class="fas fa-globe"></i> <span data-i18n="language">اللغة</span></button>
                    <div class="dropdown-panel">
                        <a href="#" data-lang="ar">العربية</a>
                        <a href="#" data-lang="en">English</a>
                        <a href="#" data-lang="fr">Français</a>
                    </div>
                </div>
                <button type="button" class="dark-toggle" id="darkToggle"><i class="fas fa-moon"></i></button>
                <div id="authSection"></div>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="form-card">
            <div class="form-header-icon"><i class="fas fa-clipboard-list"></i></div>
            <h2 class="form-title" data-i18n="request_title">طلب خدمة جديدة</h2>
            <p class="form-subtitle" data-i18n="request_subtitle">أكمل الخطوات التالية</p>

            <div class="progress-steps">
                <div class="step-item active" data-step="1"><div class="step-number">1</div><div class="step-label" data-i18n="step_personal">بيانات شخصية</div></div>
                <div class="step-item" data-step="2"><div class="step-number">2</div><div class="step-label" data-i18n="step_address">الموقع</div></div>
                <div class="step-item" data-step="3"><div class="step-number">3</div><div class="step-label" data-i18n="step_description">وصف المشكلة</div></div>
                <div class="step-item" data-step="4"><div class="step-number">4</div><div class="step-label" data-i18n="step_confirm">صور وتأكيد</div></div>
            </div>

            <form id="orderForm">
                <div class="form-step form-step-active" data-step="1">
                    <div class="form-group">
                        <label><i class="fas fa-wrench"></i> <span data-i18n="specialty">التخصص</span> *</label>
                        <select id="specialtySelect" required></select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> <span data-i18n="full_name">الاسم الكامل</span> *</label>
                        <input type="text" id="fullName" required autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> <span data-i18n="email">البريد</span> *</label>
                        <input type="email" id="emailOrder" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> <span data-i18n="phone">الهاتف</span> *</label>
                        <div class="phone-input-group">
                            <span class="phone-prefix">+20</span>
                            <input type="tel" id="phoneOrder" placeholder="10XXXXXXXX" required autocomplete="tel">
                        </div>
                    </div>
                </div>

                <div class="form-step" data-step="2">
                    <div class="form-group">
                        <label><i class="fas fa-city"></i> <span data-i18n="governorate">المحافظة</span> *</label>
                        <select id="governorateSelect" required><option value="">--</option></select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt"></i> <span data-i18n="district">المركز / الحي</span> *</label>
                        <select id="districtSelect" disabled required><option value="">--</option></select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-home"></i> <span data-i18n="detailed_address">العنوان</span> *</label>
                        <textarea id="address" rows="2" required></textarea>
                    </div>
                    <button type="button" class="location-btn" id="getLocationBtn">
                        <i class="fas fa-map-marker-alt"></i> <span data-i18n="locate_me">تحديد موقعي</span>
                    </button>
                </div>

                <div class="form-step" data-step="3">
                    <div class="form-group">
                        <label><i class="fas fa-file-alt"></i> <span data-i18n="problem_details">وصف المشكلة</span> *</label>
                        <textarea id="problemDesc" rows="4" required data-i18n-placeholder="problem_placeholder"></textarea>
                    </div>
                </div>

                <div class="form-step" data-step="4">
                    <div class="form-group">
                        <label><i class="fas fa-image"></i> <span data-i18n="attach_images">صور</span></label>
                        <input type="file" id="images" multiple accept="image/*">
                        <div id="imagePreview" class="image-preview"></div>
                    </div>
                    <div class="terms-checkbox">
                        <input type="checkbox" id="requestTerms" required>
                        <label for="requestTerms"><span data-i18n="agree_terms">أوافق</span> <a href="terms.html" id="requestTermsLink" data-i18n="terms">الشروط</a></label>
                    </div>
                </div>

                <div class="form-navigation">
                    <button type="button" id="prevBtn" class="btn btn-outline" style="display: none;"><i class="fas fa-arrow-right"></i> <span data-i18n="previous">السابق</span></button>
                    <button type="button" id="nextBtn" class="btn btn-primary"><span data-i18n="next">التالي</span> <i class="fas fa-arrow-left"></i></button>
                    <button type="submit" id="submitBtn" class="btn btn-primary" style="display: none;"><i class="fas fa-paper-plane"></i> <span data-i18n="submit_request">إرسال</span></button>
                </div>
            </form>
        </div>
    </main>

    <div class="floating-menu">
        <button type="button" class="floating-btn" id="floatingMenuBtn"><i class="fas fa-plus"></i></button>
        <div class="floating-options" id="floatingOptions">
            <a href="https://wa.me/201272076840" target="_blank" rel="noopener noreferrer" class="float-option whatsapp"><i class="fab fa-whatsapp"></i> <span>WhatsApp</span></a>
            <button type="button" class="float-option chat" id="chatFloatBtn"><i class="fas fa-headset"></i> <span data-i18n="support">الدعم</span></button>
            <button type="button" class="float-option help" id="helpFloatBtn"><i class="fas fa-question-circle"></i> <span data-i18n="help">مساعدة</span></button>
        </div>
    </div>

    <div class="chat-window" id="chatWindow">
        <div class="chat-header"><span><i class="fas fa-headset"></i> <span data-i18n="support_chat_title"></span></span><span id="closeChatBtn" class="close-window">&times;</span></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area" id="chatInputArea" style="display: none;"><input type="text" id="chatInput"><button type="button" id="sendChatBtn"><i class="fas fa-paper-plane"></i></button></div>
    </div>

    <div class="help-window" id="helpWindow">
        <div class="help-header"><span><i class="fas fa-question-circle"></i> <span data-i18n="help_window_title"></span></span><span id="closeHelpBtn" class="close-window">&times;</span></div>
        <div class="help-form" id="helpForm">
            <div class="help-menu" id="helpMenu">
                <button type="button" class="help-menu-btn" data-action="create" data-i18n="help_faq_account"></button>
                <button type="button" class="help-menu-btn" data-action="request" data-i18n="help_faq_request"></button>
                <button type="button" class="help-menu-btn" data-action="other" data-i18n="help_other"></button>
                <button type="button" class="help-menu-btn" data-action="whatsapp" data-i18n="support"></button>
            </div>
            <div class="help-message-area" id="helpMessageArea" style="display: none;">
                <textarea id="helpMessageInput" rows="4"></textarea>
                <button type="button" id="sendHelpMsgBtn" class="btn btn-primary" data-i18n="help_send"></button>
                <button type="button" id="backToHelpMenuBtn" class="btn btn-outline" data-i18n="help_back"></button>
            </div>
            <div class="help-confirmation" id="helpConfirmation" style="display: none;">
                <p><i class="fas fa-check-circle"></i> <span data-i18n="response_24h"></span></p>
                <button type="button" id="closeHelpConfirmBtn" class="btn btn-primary" data-i18n="help_ok"></button>
            </div>
        </div>
    </div>

            <a href="https://k.kwai.com/u/@elmshed7/4bzjCrBN" target="_blank" rel="noopener noreferrer" class="social-link social-kwai" aria-label="Kwai"><span class="kwai-label">Kwai</span></a>
        </div>
        <div class="allow-copy footer-contact-block">
            <div><i class="fas fa-envelope"></i> <span data-i18n="inquiries"></span> <a href="mailto:abodahka755@gmail.com">abodahka755@gmail.com</a></div>

    <script src="JavaScript/data.js"></script>
