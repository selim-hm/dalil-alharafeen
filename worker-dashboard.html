<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الحرفي — Handyman Directory + Tanta 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
</head>
<body>
    <div class="page-bg" id="pageBg" aria-hidden="true"><div class="blob blob-1"></div></div>

    <header class="site-header">
        <div class="logo">
            <a href="index.html">
                <span class="logo-mark" aria-hidden="true"><i class="fas fa-tools"></i><i class="fas fa-wrench" style="font-size:0.65em;margin-inline-start:-4px;"></i></span>
                <span data-i18n="app_name">دليل الحرفيين</span>
            </a>
        </div>
        <nav class="site-nav">
            <div class="site-nav-links">
                <a href="index.html" data-i18n="nav_home">الرئيسية</a>
                <a href="all-specialties.html" data-i18n="nav_specialties">التخصصات</a>
                <a href="terms.html" data-i18n="nav_terms">الشروط والأحكام</a>
            </div>
            <div class="nav-actions">
                <div class="dropdown lang-dropdown">
                    <button type="button" class="lang-toggle" id="langToggleBtn"><i class="fas fa-globe"></i> <span data-i18n="language">اللغة</span></button>
                    <div class="dropdown-panel">
                        <a href="#" data-lang="ar">العربية</a>
                        <a href="#" data-lang="en">English</a>
                        <a href="#" data-lang="fr">Français</a>
                    </div>
                </div>
                <button type="button" class="dark-toggle" id="darkToggle"><i class="fas fa-moon"></i></button>
                <div id="authSection"></div>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="dashboard-wrapper">
            <aside class="sidebar">
                <ul>
                    <li><a href="#" class="active" data-section="requests"><i class="fas fa-briefcase"></i> <span data-i18n="incoming_requests"></span></a></li>
                    <li><a href="#" data-section="profile"><i class="fas fa-user-edit"></i> <span data-i18n="edit_profile"></span></a></li>
                    <li><a href="#" data-section="settings"><i class="fas fa-cog"></i> <span data-i18n="settings"></span></a></li>
                    <li><a href="#" id="logoutSidebar"><i class="fas fa-sign-out-alt"></i> <span data-i18n="logout"></span></a></li>
                </ul>
            </aside>
            <div class="dashboard-main">
                <div class="welcome-banner">
                    <h3><i class="fas fa-smile-wink"></i> <span id="welcomeMessage"></span></h3>
                    <div class="badge"><i class="fas fa-calendar-alt"></i> <span id="currentDate"></span></div>
                </div>

                <div id="requestsSection" class="dashboard-card">
                    <h3><i class="fas fa-clipboard-list"></i> <span data-i18n="incoming_requests"></span> <span id="requestsCount" class="stats-badge">0</span></h3>
                    <div id="workerRequestsList" class="worker-requests-list"></div>
                </div>

                <div id="profileSection" class="dashboard-card" style="display: none;">
                    <h3><i class="fas fa-user-edit"></i> <span data-i18n="edit_profile"></span></h3>
                    <form id="editProfileForm">
                        <div class="form-row">
                            <div class="form-group half"><label data-i18n="first_name"></label><input type="text" id="editFname" required></div>
                            <div class="form-group half"><label data-i18n="last_name"></label><input type="text" id="editLname" required></div>
                        </div>
                        <div class="form-group"><label data-i18n="email"></label><input type="email" id="editEmail" disabled></div>
                        <div class="form-group"><label data-i18n="phone"></label><div class="phone-input-group"><span class="phone-prefix">+20</span><input type="tel" id="editPhone" required></div></div>
                        <div class="form-group"><label data-i18n="birth_date"></label><input type="date" id="editBirthDate" required></div>
                        <div class="form-group"><label data-i18n="address"></label><input type="text" id="editAddress"></div>
                        <div class="form-group"><label data-i18n="new_password"></label><div class="password-wrapper"><input type="password" id="editPassword"><i class="fas fa-eye password-toggle" id="toggleEditPassword"></i></div></div>
                        <button type="submit" class="btn btn-primary btn-block" data-i18n="save_changes"></button>
                        <div id="profileUpdateMsg" class="success-msg" style="display: none;"></div>
                    </form>
                </div>

                <div id="settingsSection" class="dashboard-card" style="display: none;">
                    <h3><i class="fas fa-cog"></i> <span data-i18n="settings"></span></h3>
                    <div class="form-group">
                        <label data-i18n="delete_account"></label>
                        <button type="button" id="deleteAccountBtn" class="btn btn-outline" style="border-color: rgba(220,38,38,0.5); color: var(--error);" data-i18n="delete_account_confirm"></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="floating-menu">
        <button type="button" class="floating-btn" id="floatingMenuBtn"><i class="fas fa-plus"></i></button>
        <div class="floating-options" id="floatingOptions">
            <a href="https://wa.me/201272076840" target="_blank" rel="noopener noreferrer" class="float-option whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            <button type="button" class="float-option chat" id="chatFloatBtn"><i class="fas fa-headset"></i> <span data-i18n="support"></span></button>
            <button type="button" class="float-option help" id="helpFloatBtn"><i class="fas fa-question-circle"></i> <span data-i18n="help"></span></button>
        </div>
    </div>
    <div class="chat-window" id="chatWindow">
        <div class="chat-header"><span><i class="fas fa-headset"></i> <span data-i18n="support_chat_title"></span></span><span id="closeChatBtn" class="close-window">&times;</span></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area" id="chatInputArea" style="display: none;"><input type="text" id="chatInput"><button type="button" id="sendChatBtn"><i class="fas fa-paper-plane"></i></button></div>
    </div>
    <div class="help-window" id="helpWindow">
        <div class="help-header"><span><i class="fas fa-question-circle"></i> <span data-i18n="help_window_title"></span></span><span id="closeHelpBtn" class="close-window">&times;</span></div>
        <div class="help-form" id="helpForm">
            <div class="help-menu" id="helpMenu">
                <button type="button" class="help-menu-btn" data-action="create" data-i18n="help_faq_account"></button>
                <button type="button" class="help-menu-btn" data-action="request" data-i18n="help_faq_request"></button>
                <button type="button" class="help-menu-btn" data-action="other" data-i18n="help_other"></button>
                <button type="button" class="help-menu-btn" data-action="whatsapp" data-i18n="support"></button>
            </div>
            <div class="help-message-area" id="helpMessageArea" style="display: none;">
                <textarea id="helpMessageInput" rows="4"></textarea>
                <button type="button" id="sendHelpMsgBtn" class="btn btn-primary" data-i18n="help_send"></button>
                <button type="button" id="backToHelpMenuBtn" class="btn btn-outline" data-i18n="help_back"></button>
            </div>
            <div class="help-confirmation" id="helpConfirmation" style="display: none;">
                <p><i class="fas fa-check-circle"></i> <span data-i18n="response_24h"></span></p>
                <button type="button" id="closeHelpConfirmBtn" class="btn btn-primary" data-i18n="help_ok"></button>
            </div>
        </div>
    </div>

    <footer class="site-footer-extended">
        <div class="footer-legal-row"><a href="terms.html" data-i18n="nav_terms"></a></div>
        <div class="social-icons social-icons-footer">
            <a href="https://wa.me/201272076840" target="_blank" rel="noopener noreferrer" class="social-link whatsapp" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.youtube.com/@technology840?si=-F7lMRBfchWRGMEw" target="_blank" rel="noopener noreferrer" class="social-link youtube" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
            <a href="https://www.facebook.com/share/1JLDCWRJZP/" target="_blank" rel="noopener noreferrer" class="social-link facebook" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
            <a href="https://github.com/elmshed7" target="_blank" rel="noopener noreferrer" class="social-link social-github" aria-label="GitHub"><i class="fab fa-github"></i></a>
            <a href="https://www.linkedin.com/in/mohamed-ahmed-382080377" target="_blank" rel="noopener noreferrer" class="social-link social-linkedin" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            <a href="https://k.kwai.com/u/@elmshed7/4bzjCrBN" target="_blank" rel="noopener noreferrer" class="social-link social-kwai" aria-label="Kwai"><span class="kwai-label">Kwai</span></a>
        </div>
        <div class="allow-copy footer-contact-block">
            <div><i class="fas fa-envelope"></i> <span data-i18n="inquiries"></span> <a href="mailto:abodahka755@gmail.com">abodahka755@gmail.com</a></div>
            <div><i class="fas fa-phone"></i> <a href="tel:+201272076840">+20 127 207 6840</a></div>
        </div>
        <div data-i18n="copyright"></div>
    </footer>

    <script src="JavaScript/data.js"></script>
    <script src="JavaScript/i18n.js"></script>
    <script src="JavaScript/theme.js"></script>
    <script src="JavaScript/animations.js"></script>
    <script src="JavaScript/ui.js"></script>
    <script src="JavaScript/auth.js"></script>
    <script src="JavaScript/specialties.js"></script>

    <script src="JavaScript/main.js"></script>

        document.addEventListener("DOMContentLoaded", function () {
            App.initWorkerDashboard();
            document.querySelector(".site-header").classList.add("is-solid");
        });
    </script>
</body>
</html>
